<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato: Demonio del Secreto</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* EL DEMONIO - Masa central visible */
        .demon-container {
            position: absolute;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .demon-body {
            width: 450px;
            height: 450px;
            background: #0d0d0d;
            position: relative;
            filter: blur(10px);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            box-shadow: 0 0 80px #600;
            transition: all 0.3s ease;
        }

        /* Ojos rojos brillantes */
        .eye {
            position: absolute;
            background: #ff0000;
            width: 35px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 25px #ff0000;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); opacity: 1; }
            95% { transform: scaleY(0.1); opacity: 0.5; }
        }

        /* Interfaz del Contrato */
        .contract-ui {
            position: relative;
            z-index: 10;
            background: rgba(5, 5, 5, 0.95);
            padding: 40px;
            border: 2px solid #400;
            text-align: center;
            max-width: 420px;
            box-shadow: 0 0 100px #000;
            transition: transform 0.5s ease;
        }

        h1 { 
            color: #900; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            margin-top: 0;
        }

        p { line-height: 1.5; font-size: 1rem; }
        
        .blood-warning {
            color: #ff3333;
            font-weight: bold;
            display: block;
            margin: 15px 0;
        }

        .btn-group { 
            margin-top: 30px; 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
        }
        
        button {
            background: #111;
            color: #888;
            border: 1px solid #444;
            padding: 12px 30px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            color: #fff;
            border-color: #f00;
            box-shadow: 0 0 15px #800;
        }

        /* --- ESTADOS DINÁMICOS --- */

        /* El Demonio se RETUERCE (Animación violenta) */
        .demon-spasm {
            animation: twist 0.15s infinite alternate !important;
            background: #300 !important;
            filter: blur(2px) !important;
            transform: scale(1.6) !important;
        }

        @keyframes twist {
            0% { border-radius: 30% 70% 70% 30%; transform: translate(5px, -5px) scale(1.5); }
            50% { border-radius: 50% 50% 20% 80%; transform: translate(-5px, 5px) scale(1.7); }
            100% { border-radius: 80% 20% 50% 50%; transform: translate(10px, 10px) scale(1.6); }
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.2);
            transition: 2s;
        }
    </style>
</head>
<body>

    <div class="demon-container">
        <div class="demon-body" id="demon">
            <div class="eye" style="top:25%; left:20%;"></div>
            <div class="eye" style="top:15%; left:55%;"></div>
            <div class="eye" style="top:50%; left:35%;"></div>
            <div class="eye" style="top:70%; left:60%;"></div>
            <div class="eye" style="top:40%; left:75%;"></div>
            <div class="eye" style="top:80%; left:25%;"></div>
        </div>
    </div>

    <div class="contract-ui" id="contract-box">
        <h1>DEMONIO DEL SECRETO</h1>
        <p>"Tus secretos estarán a salvo y nadie los escuchará..."</p>
        <span class="blood-warning">QUIEN LOS ESCUCHE MORIRÁ.</span>
        <p>¿Firmas el contrato?</p>
        
        <div class="btn-group">
            <button onclick="acceptContract()">SÍ</button>
            <button onclick="rejectContract()">NO</button>
        </div>
    </div>

    <script>
        const demon = document.getElementById('demon');
        const box = document.getElementById('contract-box');

        function acceptContract() {
            // El demonio se retuerce violentamente
            demon.classList.add('demon-spasm');
            
            // Cambio de contenido con la nueva condición
            box.style.borderColor = "#f00";
            box.innerHTML = `
                <h1 style="color: #ff0000; animation: blink 0.5s infinite;">CONTRATO CONSUMADO</h1>
                <p style="font-size: 1.2rem;">Ahora eres <b>propiedad del secreto</b>.</p>
                <p style="color: #ff3333; border: 1px solid #600; padding: 10px;">
                    A cambio, tendrás que mandar tu próxima actualización de correo.
                </p>
                <p style="font-size: 0.8rem; color: #555;">El demonio espera...</p>
            `;
            
            // Efecto de sacudida en la pantalla
            document.body.style.animation = "twist 0.1s infinite";
            setTimeout(() => { document.body.style.animation = "none"; }, 500);
        }

        function rejectContract() {
            // El demonio desaparece en las sombras
            demon.classList.add('fade-out');
            box.innerHTML = `
                <h1 style="color: #444;">CONTRATO RECHAZADO</h1>
                <p>El demonio del secreto se desvanece... por ahora.</p>
            `;
            box.style.borderColor = "#222";
        }
    </script>
</body>
</html>
