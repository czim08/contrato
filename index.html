<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ERROR_SISTEMA_CRITICO</title>
    <style>
        :root {
            --raw-flesh: #4d0000;
            --void: #020202;
            --blood: #ff0000;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: var(--void);
            color: #555;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* EL DEMONIO: Una masa de carne y sombras que parece "palpitar" */
        #demon-flesh {
            position: absolute;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, #1a0000 0%, #000 80%);
            filter: blur(40px);
            opacity: 0.7;
            z-index: 1;
            animation: pulse 0.05s infinite; /* Vibración imperceptible que genera malestar */
        }

        @keyframes pulse {
            0% { transform: scale(1) translate(0,0); opacity: 0.7; }
            50% { transform: scale(1.02) translate(1px, -1px); opacity: 0.8; }
            100% { transform: scale(1) translate(-1px, 1px); opacity: 0.7; }
        }

        /* Ojos que no deberían estar ahí */
        .eye-socket {
            position: absolute;
            width: 25px;
            height: 15px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 15px red;
            display: none; /* Aparecen por JS */
            z-index: 2;
            filter: contrast(2);
        }

        .pupil {
            width: 8px;
            height: 8px;
            background: black;
            border-radius: 50%;
            margin: 3px auto;
        }

        /* EL CONTRATO: Estilo documento corrupto */
        #ui-wrapper {
            position: relative;
            z-index: 100;
            background: rgba(0,0,0,0.98);
            border: 1px solid #220000;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 100px rgba(255,0,0,0.1);
        }

        h1 {
            font-size: 0.9rem;
            letter-spacing: 15px;
            color: var(--raw-flesh);
            margin-bottom: 50px;
            animation: text-glitch 0.2s infinite;
        }

        @keyframes text-glitch {
            0% { opacity: 1; transform: skew(0deg); }
            20% { opacity: 0.5; transform: skew(10deg); }
            21% { opacity: 1; transform: skew(0deg); }
            100% { opacity: 1; }
        }

        .clause {
            font-size: 0.8rem;
            color: #444;
            margin: 15px 0;
            line-height: 1.4;
            text-align: justify;
        }

        .warning {
            color: var(--blood);
            font-weight: bold;
            font-size: 1.1rem;
            margin: 20px 0;
            text-decoration: underline;
        }

        .btn-container {
            margin-top: 50px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        button {
            background: black;
            border: 1px solid #1a0000;
            color: #333;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.1s;
        }

        button:hover {
            color: white;
            border-color: red;
            background: #400;
        }

        /* EFECTO "RETORCERSE" (CONVULSIÓN TOTAL) */
        .agony {
            animation: violent-shake 0.1s infinite !important;
            filter: invert(1) grayscale(1) contrast(5) !important;
        }

        @keyframes violent-shake {
            0% { transform: translate(5px, 5px) scale(3); }
            50% { transform: translate(-10px, 10px) scale(3.5); }
            100% { transform: translate(10px, -5px) scale(3); }
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, black 100%);
            pointer-events: none;
            z-index: 200;
        }
    </style>
</head>
<body onmousemove="updateEyes(event)">

    <div class="vignette"></div>
    <div id="demon-flesh"></div>

    <div id="ui-wrapper">
        <h1>CONTRATO</h1>
        <div class="clause">EL DEMONIO DEL SECRETO HA SIDO INVOCADO. TUS CONFESIONES NO DEJARÁN ESTA HABITACIÓN.</div>
        <div class="clause">EL SILENCIO SE PAGA CON SILENCIO.</div>
        <div class="warning">QUIEN ESCUCHE, MORIRÁ.</div>
        <p style="font-size: 0.7rem;">¿ENTREGARÁS TU ALMA AL SECRETO?</p>
        
        <div class="btn-container">
            <button onclick="firmar()">SÍ, ACEPTO SER SU PROPIEDAD</button>
            <button onmouseover="huye(this)" onclick="firmar()">NO</button>
        </div>
    </div>

    <script>
        const demon = document.getElementById('demon-flesh');
        const body = document.body;
        const ui = document.getElementById('ui-wrapper');

        // Generar ojos en posiciones aleatorias del "cuerpo" del demonio
        for(let i=0; i<15; i++) {
            let eye = document.createElement('div');
            eye.className = 'eye-socket';
            eye.innerHTML = '<div class="pupil"></div>';
            eye.style.left = Math.random() * 80 + 10 + '%';
            eye.style.top = Math.random() * 80 + 10 + '%';
            body.appendChild(eye);
        }

        const sockets = document.querySelectorAll('.eye-socket');

        function updateEyes(e) {
            sockets.forEach(s => {
                // Los ojos aparecen y desaparecen aleatoriamente
                s.style.display = Math.random() > 0.95 ? 'block' : (Math.random() > 0.9 ? 'none' : s.style.display);
                
                // Las pupilas siguen al mouse ligeramente
                let pupil = s.querySelector('.pupil');
                let x = (e.clientX / window.innerWidth) * 5;
                let y = (e.clientY / window.innerHeight) * 5;
                pupil.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        // El botón "NO" se escapa, obligándote a aceptar (Psicología de pérdida de control)
        function huye(btn) {
            btn.style.position = 'absolute';
            btn.style.top = Math.random() * 80 + '%';
            btn.style.left = Math.random() * 80 + '%';
        }

        function firmar() {
            // El demonio "sonríe" y se retuerce de forma traumática
            document.querySelectorAll('.eye-socket').forEach(s => s.style.display = 'block');
            demon.classList.add('agony');
            body.style.backgroundColor = "white"; // Flash cegador
            
            setTimeout(() => {
                body.style.backgroundColor = "black";
                ui.innerHTML = `
                    <h1 style="color:red; animation: none;">CONTRATO SELLADO</h1>
                    <p style="color:white; font-weight:bold; font-size:1.2rem;">ERES PROPIEDAD DEL SECRETO.</p>
                    <p style="color:red; border: 2px solid red; padding: 20px; background: #100;">
                        TU PRÓXIMA ACTUALIZACIÓN DE CORREO SERÁ ENVIADA A LAS SOMBRAS. EL DEMONIO YA ESTÁ DENTRO.
                    </p>
                    <div style="font-size:0.5rem; color:#333; margin-top:20px;">No mires atrás al cerrar la pestaña.</div>
                `;
                
                // Iniciar un sonido visual de estática (glitch de color)
                setInterval(() => {
                    body.style.filter = `hue-rotate(${Math.random()*360}deg)`;
                }, 50);
            }, 200);
        }
    </script>
</body>
</html>
