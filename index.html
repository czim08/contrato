<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CONTRATO_VINCULANTE_ETERNO</title>
    <style>
        @keyframes jitter {
            0% { transform: translate(0,0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            100% { transform: translate(0,0); }
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); filter: blur(15px); }
            50% { transform: scale(1.05); filter: blur(25px); }
        }

        @keyframes glitch {
            0% { clip-path: inset(10% 0 30% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            60% { clip-path: inset(30% 0 50% 0); }
            100% { clip-path: inset(10% 0 30% 0); }
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            background-color: #020202;
            color: #4a0000;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: crosshair;
        }

        /* EL DEMONIO: Masa amorfa basada en manchas de Rorschach */
        #demon-shroud {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, #0a0a0a 0%, #000 70%);
            border-radius: 40% 60% 30% 70% / 60% 30% 70% 40%;
            animation: breathe 4s infinite ease-in-out;
            z-index: 1;
            box-shadow: inset 0 0 50px #000, 0 0 100px #1a0000;
        }

        .eye-stalk {
            position: absolute;
            background: #ff0000;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 20px #f00;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        /* CUADRO DE TEXTO: Estilo registro médico/judicial antiguo */
        #contract-ui {
            position: relative;
            z-index: 50;
            background: rgba(0, 0, 0, 0.95);
            border: 1px solid #1a0000;
            padding: 50px;
            text-align: left;
            max-width: 450px;
            box-shadow: 0 0 100px #000;
        }

        h1 {
            font-size: 1.2rem;
            color: #600;
            text-align: center;
            letter-spacing: 10px;
            margin-bottom: 30px;
            animation: jitter 0.1s infinite;
        }

        p {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 20px;
        }

        .secret-condition {
            color: #ff0000;
            font-weight: bold;
            text-shadow: 0 0 5px #ff0000;
            text-transform: uppercase;
        }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 40px;
        }

        button {
            background: none;
            border: 1px solid #300;
            color: #300;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        button:hover {
            color: #ff0000;
            border-color: #ff0000;
            background: rgba(20, 0, 0, 1);
        }

        /* EFECTO CUANDO SE RETUERCE */
        .convulsion {
            animation: glitch 0.1s infinite !important;
            filter: invert(1) contrast(2) !important;
            transform: scale(2) !important;
        }
    </style>
</head>
<body onmousemove="moveEyes(event)">

    <div id="demon-shroud">
        <div class="eye-stalk" id="e1" style="top: 30%; left: 40%;"></div>
        <div class="eye-stalk" id="e2" style="top: 20%; left: 60%;"></div>
        <div class="eye-stalk" id="e3" style="top: 50%; left: 35%;"></div>
        <div class="eye-stalk" id="e4" style="top: 70%; left: 55%;"></div>
        <div class="eye-stalk" id="e5" style="top: 45%; left: 80%;"></div>
    </div>

    <div id="contract-ui">
        <h1>CONTRATO</h1>
        <p>Has entrado en el dominio del <strong>Demonio del Secreto</strong>.</p>
        <p>Tus secretos no serán escuchados por oídos humanos. La seguridad es absoluta.</p>
        <p class="secret-condition">SI ALGUIEN ESCUCHA, EL DEMONIO COBRARÁ SU LENGUA Y SU VIDA.</p>
        <p>¿Aceptas el vínculo de sangre?</p>

        <div class="btn-box">
            <button onclick="accept()">SÍ, ACEPTO EL PRECIO</button>
            <button onclick="reject()">NO (CORRER)</button>
        </div>
    </div>

    <script>
        const shroud = document.getElementById('demon-shroud');
        const ui = document.getElementById('contract-ui');
        const eyes = document.querySelectorAll('.eye-stalk');

        // Los ojos siguen ligeramente el cursor (Efecto de acoso)
        function moveEyes(e) {
            eyes.forEach(eye => {
                eye.style.opacity = Math.random() > 0.9 ? "0" : "1"; // Parpadeo errático
                let x = (e.clientX / window.innerWidth) * 10;
                let y = (e.clientY / window.innerHeight) * 10;
                eye.style.transform = `translate(${x}px, ${y}px)`;
            });
        }

        function accept() {
            shroud.classList.add('convulsion');
            document.body.style.backgroundColor = "#200";
            
            // Audio visual: Vibración violenta
            ui.innerHTML = `
                <h1 style="color:red; animation: jitter 0.05s infinite;">PROPIEDAD RECLAMADA</h1>
                <p style="color:#fff; text-align:center;">
                    Ahora eres <strong>propiedad del secreto</strong>.
                </p>
                <div style="border: 1px solid red; padding: 10px; color: red; font-size: 0.8rem; text-align: center;">
                    PAGO PENDIENTE: <br> MANDAR TU PRÓXIMA ACTUALIZACIÓN DE CORREO.
                </div>
                <p style="font-size: 0.6rem; color: #444; margin-top: 20px;">
                    Él ya sabe lo que vas a escribir.
                </p>
            `;
        }

        function reject() {
            // El rechazo es más inquietante: el demonio se acerca antes de irse
            shroud.style.transform = "scale(5)";
            shroud.style.opacity = "0";
            shroud.style.transition = "transform 0.5s, opacity 1s";
            
            ui.innerHTML = `
                <h1>DEMASIADO TARDE</h1>
                <p>El demonio ha visto tu rostro. El contrato se cancela, pero el silencio te seguirá.</p>
            `;
            setTimeout(() => {
                document.body.style.display = "none"; // La página "muere"
            }, 3000);
        }
    </script>
</body>
</html>
