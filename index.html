<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato con el Demonio del Secreto</title>
    <style>
        :root {
            --blood-red: #8a0303;
            --devil-black: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--devil-black);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Fondo del Demonio */
        #demon-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease-in-out;
        }

        /* Representación visual del demonio (SVG o silueta) */
        .demon-eye {
            width: 300px;
            filter: drop-shadow(0 0 15px var(--blood-red));
            transition: transform 0.3s ease;
        }

        /* Interfaz del Contrato */
        .contract-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid var(--blood-red);
            text-align: center;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(138, 3, 3, 0.5);
        }

        h1 {
            color: var(--blood-red);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
        }

        button {
            background: transparent;
            border: 1px solid white;
            color: white;
            padding: 10px 30px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.3s;
        }

        button:hover {
            background: var(--blood-red);
            border-color: var(--blood-red);
            box-shadow: 0 0 10px var(--blood-red);
        }

        /* Animaciones */
        .twist {
            animation: twist-anim 0.5s infinite alternate;
        }

        @keyframes twist-anim {
            from { transform: rotate(-5deg) scale(1.1); }
            to { transform: rotate(5deg) scale(1.2) skew(10deg); }
        }

        .smile {
            filter: hue-rotate(90deg) brightness(1.5);
            transform: scale(1.3);
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.5);
        }
    </style>
</head>
<body>

    <div id="demon-container">
        <svg class="demon-eye" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path fill="#222" d="M40,-62C53.3,-54.1,66.6,-45.1,75.4,-32.5C84.2,-19.9,88.5,-3.7,85.2,11.3C81.9,26.3,71,40.1,58.8,51.1C46.6,62.1,33.1,70.3,18.4,74.1C3.7,77.9,-12.1,77.3,-26.8,72.1C-41.5,66.9,-55.1,57.1,-64.8,44.1C-74.5,31.1,-80.3,14.9,-78.9,0.8C-77.5,-13.3,-68.9,-25.3,-59,-35.3C-49.1,-45.3,-37.9,-53.3,-25.9,-62C-13.9,-70.7,-1,-80.1,13.4,-77.8C27.8,-75.5,40,-62,40,-62Z" transform="translate(100 100)" />
            <circle cx="100" cy="80" r="10" fill="red" />
        </svg>
    </div>

    <div class="contract-box" id="ui">
        <h1>Demonio del Secreto</h1>
        <p>
            "Tus secretos estarán a salvo y nadie los escuchará... <br>
            <strong>Quien los escuche, morirá.</strong>"
        </p>
        <p>¿Aceptas las condiciones del contrato?</p>
        
        <div class="buttons">
            <button onclick="acceptContract()">SÍ</button>
            <button onclick="rejectContract()">NO</button>
        </div>
    </div>

    <script>
        const demon = document.querySelector('.demon-eye');
        const ui = document.getElementById('ui');

        function acceptContract() {
            // El demonio se retuerce y sonríe (cambio visual)
            demon.classList.add('twist');
            setTimeout(() => {
                demon.classList.add('smile');
            }, 500);
            
            alert("CONTRATO REALIZADO. El precio ha sido fijado.");
        }

        function rejectContract() {
            // El demonio desaparece
            document.getElementById('demon-container').classList.add('fade-out');
            ui.innerHTML = "<h1>CONTRATO FALLIDO</h1><p>El demonio se ha desvanecido en las sombras.</p>";
            setTimeout(() => {
                ui.style.borderColor = "#333";
            }, 500);
        }
    </script>
</body>
</html>
