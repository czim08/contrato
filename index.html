<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Protocolo de Encriptación: Secreto</title>
    <style>
        body { margin: 0; background-color: #050505; color: #cc0000; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        .ui-overlay {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            pointer-events: none; border-left: 1px solid #cc0000; padding-left: 20px;
        }
        .contract-box {
            position: absolute; bottom: 60px; width: 100%; text-align: center;
            z-index: 10; padding: 25px; background: rgba(0,0,0,0.85);
            border-top: 1px solid #333;
        }
        h1 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; }
        p { color: #777; font-size: 0.85rem; margin: 5px 0; }
        .warning { color: #cc0000; font-weight: bold; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        button {
            background: transparent; border: 1px solid #cc0000; color: #cc0000;
            padding: 12px 25px; cursor: pointer; pointer-events: all;
            transition: 0.4s; margin-top: 15px; text-transform: uppercase;
            letter-spacing: 2px; font-weight: bold;
        }
        button:hover { background: #cc0000; color: #000; box-shadow: 0 0 15px #cc0000; }
        .hidden-msg { color: #fff; font-style: italic; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div class="ui-overlay">
        <h1>CONTRATO: DEMONIO DEL SECRETO</h1>
        <p>> ORIGEN: MICHOACÁN // DESTINO: MONTERREY</p>
        <p>> SEGURIDAD: NIVEL SSS</p>
        <p class="warning">ADVERTENCIA: MAKIMA ESTÁ ESCUCHANDO</p>
    </div>

    <div id="canvas-container"></div>

    <div class="contract-box">
        <div id="text-reveal">
            <p>¿De quién deberías tener cuidado?</p>
            <p class="hidden-msg">"Solo de aquel que sabe leer entre líneas."</p>
            <button onclick="accept()">FIRMAR CONTRATO</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, demonObject;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Geometría del "Demonio" (un cristal oscuro y afilado)
            const geometry = new THREE.OctahedronGeometry(1.8, 0);
            const material = new THREE.MeshPhongMaterial({ 
                color: 0x000000, 
                shininess: 150, 
                specular: 0xff0000,
                flatShading: true
            });
            demonObject = new THREE.Mesh(geometry, material);
            scene.add(demonObject);

            // Aura de energía roja (wireframe)
            const wireGeom = new THREE.OctahedronGeometry(1.9, 0);
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xcc0000, wireframe: true, transparent: true, opacity: 0.2 });
            const aura = new THREE.Mesh(wireGeom, wireMat);
            demonObject.add(aura);

            // Iluminación dramática
            const redLight = new THREE.PointLight(0xff0000, 1.5, 50);
            redLight.position.set(5, 5, 5);
            scene.add(redLight);
            scene.add(new THREE.AmbientLight(0x111111));

            camera.position.z = 5;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            demonObject.rotation.y += 0.008;
            demonObject.rotation.z += 0.003;
            renderer.render(scene, camera);
        }

        function accept() {
            const box = document.getElementById('text-reveal');
            box.style.opacity = 0;
            setTimeout(() => {
                box.innerHTML = `
                    <p class='warning'>CONTRATO SELLADO.</p>
                    <p style="color:#eee">Términos aceptados: Canal protegido a cambio de tu **próxima actualización**.</p>
                    <p style="color:#555">Makima ha perdido la señal.</p>
                `;
                box.style.opacity = 1;
            }, 500);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
