<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato: Demonio del Secreto</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #050505;
            color: #d1d1d1;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* EL DEMONIO (Fondo dinámico) */
        #demon-background {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a0000 0%, #050505 80%);
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .demon-silhouette {
            position: relative;
            width: 400px;
            height: 400px;
            background: #000;
            border-radius: 43% 57% 70% 30% / 30% 45% 55% 70%;
            filter: blur(20px);
            opacity: 0.8;
            transition: all 0.5s ease;
            box-shadow: 0 0 100px #8a0303;
        }

        /* Ojos del demonio */
        .eye {
            position: absolute;
            background: #ff0000;
            border-radius: 50%;
            width: 15px;
            height: 5px;
            box-shadow: 0 0 15px #ff0000;
            opacity: 0.8;
        }

        /* Interfaz del Contrato */
        .contract-card {
            background: rgba(0, 0, 0, 0.85);
            padding: 3rem;
            border: 1px solid #440000;
            text-align: center;
            max-width: 450px;
            z-index: 10;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        h1 {
            color: #8a0303;
            font-size: 1.5rem;
            letter-spacing: 4px;
            border-bottom: 1px solid #440000;
            padding-bottom: 10px;
        }

        .blood-text {
            color: #ff3333;
            font-weight: bold;
            text-shadow: 2px 2px #000;
        }

        .btn-container {
            margin-top: 30px;
            display: flex;
            justify-content: space-around;
        }

        button {
            background: #000;
            color: #8a0303;
            border: 1px solid #8a0303;
            padding: 10px 40px;
            font-family: inherit;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #8a0303;
            color: white;
            box-shadow: 0 0 20px #ff0000;
        }

        /* ANIMACIONES */
        .retuerce {
            animation: tremor 0.1s infinite;
            filter: blur(10px) hue-rotate(45deg) !important;
            transform: scale(1.5) rotate(10deg);
        }

        @keyframes tremor {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-2px, -2px) rotate(1deg); }
            100% { transform: translate(1px, 2px) rotate(-1deg); }
        }

        .desaparecer {
            opacity: 0 !important;
            transform: scale(0) !important;
            transition: 2s ease;
        }
    </style>
</head>
<body>

    <div id="demon-background">
        <div class="demon-silhouette" id="demon">
            <div class="eye" style="top: 30%; left: 40%;"></div>
            <div class="eye" style="top: 20%; left: 60%;"></div>
            <div class="eye" style="top: 50%; left: 30%;"></div>
            <div class="eye" style="top: 60%; left: 70%;"></div>
            <div class="eye" style="top: 45%; left: 50%;"></div>
        </div>
    </div>

    <div class="contract-card" id="card">
        <h1>DEMONIO DEL SECRETO</h1>
        <p>"Tus secretos estarán a salvo y nadie los escuchará..."</p>
        <p class="blood-text">QUIEN LOS ESCUCHE, MORIRÁ.</p>
        <p>¿Aceptas el precio?</p>
        
        <div class="btn-container">
            <button onclick="si()">SÍ</button>
            <button onclick="no()">NO</button>
        </div>
    </div>

    <script>
        const demonio = document.getElementById('demon');
        const tarjeta = document.getElementById('card');

        function si() {
            // El demonio se retuerce violentamente
            demonio.classList.add('retuerce');
            document.body.style.backgroundColor = "#1a0000";
            alert("CONTRATO CREADO. El Demonio del Secreto ahora te observa.");
        }

        function no() {
            // El demonio desaparece
            demonio.classList.add('desaparecer');
            tarjeta.innerHTML = "<h1>CONTRATO RECHAZADO</h1><p>Has perdido tu oportunidad de ser escuchado.</p>";
            setTimeout(() => {
                document.body.style.backgroundColor = "#000";
            }, 1000);
        }
    </script>
</body>
</html>
