<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA CORRUPTO</title>
    <style>
        body, html { 
            background: #000; color: #0f0; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%;
        }

        #terminal {
            padding: 20px; font-size: 12px; line-height: 1.5;
            height: 100%; overflow: hidden;
        }

        .red { color: #f00; text-shadow: 0 0 5px #f00; }
        
        /* Efecto de parpadeo de realidad */
        .glitch {
            animation: glitch-anim 0.2s infinite;
        }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); }
            40% { transform: translate(5px, -5px); }
            60% { transform: translate(-5px, -2px); filter: invert(1); }
            100% { transform: translate(0); }
        }

        #pact-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; z-index: 999;
            flex-direction: column; justify-content: center; align-items: center;
        }

        .blood-text {
            font-size: 2rem; color: #600; text-align: center;
            font-weight: bold; letter-spacing: -2px;
        }

        .dark-eye {
            width: 100px; height: 5px; background: #f00;
            box-shadow: 0 0 30px #f00; margin: 20px;
            border-radius: 50%; animation: stare 0.1s infinite alternate;
        }

        @keyframes stare {
            from { transform: scaleX(1); }
            to { transform: scaleX(1.5) scaleY(2); }
        }
    </style>
</head>
<body onclick="iniciarSecuencia()">

    <div id="terminal">
        > Iniciando protocolo de enlace...<br>
        > Accediendo a metadatos del dispositivo... <span id="status">[OK]</span><br>
        <div id="logs"></div>
    </div>

    <div id="pact-overlay">
        <div class="dark-eye"></div>
        <div class="blood-text" id="final-msg">¿ESCUCHAS LOS GRITOS EN EL CÓDIGO?</div>
        <div class="dark-eye"></div>
    </div>

    <audio id="static" loop>
        <source src="https://www.soundjay.com/communication/sounds/radio-static-01.mp3" type="audio/mpeg">
    </audio>

    <script>
        const logs = document.getElementById('logs');
        const terminal = document.getElementById('terminal');
        const overlay = document.getElementById('pact-overlay');
        let i = 0;

        const frases = [
            "> Localizando coordenadas GPS...",
            "> Extrayendo lista de contactos...",
            "> Accediendo a galería de fotos (0%... 45%... 99%)",
            "> <span class='red'>ERROR: ENTIDAD DETECTADA EN LA RED</span>",
            "> Reconfigurando contrato vital...",
            "> El Demonio de la Oscuridad te ha encontrado.",
            "> No cierres los ojos.",
            "> No mires atrás.",
            "> Él está en el reflejo de tu pantalla."
        ];

        function iniciarSecuencia() {
            document.getElementById('static').play();
            escribirLogs();
        }

        function escribirLogs() {
            if (i < frases.length) {
                logs.innerHTML += frases[i] + "<br>";
                i++;
                setTimeout(escribirLogs, 800);
                if(navigator.vibrate) navigator.vibrate(20);
            } else {
                setTimeout(triggerPact, 1000);
            }
        }

        function triggerPact() {
            terminal.classList.add('glitch');
            if(navigator.vibrate) navigator.vibrate([1000, 500, 2000]);
            
            setTimeout(() => {
                terminal.style.display = 'none';
                overlay.style.display = 'flex';
                
                // CAMBIO PSICOLÓGICO: Hacer que el texto cambie rápido
                const msgs = ["DAME TUS OJOS", "EL CONTRATO ES ETERNO", "MÍRAME", "MÍRAME", "MÍRAME"];
                let mIdx = 0;
                setInterval(() => {
                    document.getElementById('final-msg').innerText = msgs[mIdx % msgs.length];
                    mIdx++;
                    document.body.style.backgroundColor = (mIdx % 2 == 0) ? "#000" : "#100";
                }, 100);

            }, 1000);
        }
    </script>
</body>
</html>
