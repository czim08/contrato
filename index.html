<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contrato Chainsaw Man</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* EL DEMONIO - Ahora más grande y visible */
        .demon-wrapper {
            position: absolute;
            z-index: 1;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .demon-body {
            width: 500px;
            height: 500px;
            background: #0a0a0a;
            position: relative;
            filter: blur(15px);
            border-radius: 50%;
            box-shadow: 0 0 100px #440000;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Ojos múltiples estilo Chainsaw Man */
        .eye {
            position: absolute;
            background: #ff0000;
            width: 40px;
            height: 10px;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff0000;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0); }
        }

        /* Interfaz de Contrato */
        .ui-contract {
            position: relative;
            z-index: 10;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border: 3px double #600;
            text-align: center;
            max-width: 400px;
            box-shadow: 0 0 50px #000;
        }

        h1 { color: #800; letter-spacing: 5px; text-shadow: 2px 2px #000; }
        
        .btns { margin-top: 25px; display: flex; gap: 20px; justify-content: center; }
        
        button {
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            padding: 10px 25px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        button:hover {
            color: #f00;
            border-color: #f00;
            background: rgba(255,0,0,0.1);
        }

        /* --- EFECTOS DE ACCIÓN --- */

        /* El Demonio se RETUERCE */
        .retorcer {
            animation: spasm 0.2s infinite !important;
            background: #400 !important;
            filter: blur(5px) !important;
            transform: scale(1.8) !important;
        }

        @keyframes spasm {
            0% { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
            25% { clip-path: polygon(30% 10%, 90% 20%, 70% 90%, 20% 80%, 5% 40%); }
            50% { clip-path: polygon(50% 20%, 80% 0%, 100% 70%, 10% 100%, 0% 10%); }
            75% { clip-path: polygon(10% 0%, 100% 10%, 80% 80%, 40% 100%, 0% 60%); }
            100% { clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
        }

        /* Desaparecer */
        .fade-out {
            opacity: 0;
            transform: scale(0) rotate(180deg);
            transition: 1.5s ease;
        }
    </style>
</head>
<body>

    <div class="demon-wrapper">
        <div class="demon-body" id="demon">
            <div class="eye" style="top:20%; left:30%;"></div>
            <div class="eye" style="top:40%; left:60%; width:60px;"></div>
            <div class="eye" style="top:70%; left:25%;"></div>
            <div class="eye" style="top:10%; left:50%; width:20px;"></div>
            <div class="eye" style="top:80%; left:55%; width:30px;"></div>
            <div class="eye" style="top:50%; left:10%; width:50px;"></div>
        </div>
    </div>

    <div class="ui-contract" id="box">
        <h1>DEMONIO DEL SECRETO</h1>
        <p>"Tus secretos estarán a salvo y nadie los escuchará..."</p>
        <p style="color:red; font-weight:bold;">QUIEN LOS ESCUCHE MORIRÁ.</p>
        
        <div class="btns">
            <button onclick="aceptar()">SÍ</button>
            <button onclick="rechazar()">NO</button>
        </div>
    </div>

    <script>
        const demon = document.getElementById('demon');
        const box = document.getElementById('box');

        function aceptar() {
            // El demonio se vuelve loco y se retuerce
            demon.classList.add('retorcer');
            
            // Cambiar el texto de la caja
            box.innerHTML = "<h1 style='color:red'>CONTRATO CONSUMADO</h1><p>Ahora eres propiedad del secreto.</p>";
            
            // Sonido visual (vibración de pantalla)
            document.body.style.animation = "spasm 0.1s infinite";
            setTimeout(() => { document.body.style.animation = "none"; }, 1000);
        }

        function rechazar() {
            // El demonio se va
            demon.classList.add('fade-out');
            box.innerHTML = "<h1>...</h1><p>El silencio vuelve a ser ordinario.</p>";
        }
    </script>
</body>
</html>
