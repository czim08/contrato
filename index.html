<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA_VINCULANTE</title>
    <style>
        :root { --b: #000; --r: #f00; --g: #111; }
        * { cursor: none !important; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--b); color: #444; 
            font-family: 'Courier New', monospace; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* EL DEMONIO: Masa que se expande y contrae como un corazón */
        #demon {
            position: absolute; width: 150%; height: 150%;
            background: radial-gradient(circle, #1a0000 0%, #000 50%);
            z-index: 1; filter: blur(80px);
            animation: breathe 0.08s infinite alternate;
        }

        @keyframes breathe {
            from { transform: scale(1); opacity: 0.6; }
            to { transform: scale(1.1); opacity: 0.9; filter: blur(40px) contrast(3); }
        }

        /* Ojos latentes en la oscuridad */
        .watcher {
            position: absolute; width: 2px; height: 2px;
            background: var(--r); border-radius: 50%;
            box-shadow: 0 0 10px var(--r); z-index: 2; opacity: 0;
        }

        #ui {
            position: relative; z-index: 10; width: 80%; max-width: 400px;
            text-align: center; background: rgba(0,0,0,0.95);
            padding: 40px; border-left: 1px solid #200;
        }

        h1 { font-size: 1rem; letter-spacing: 10px; color: #500; margin-bottom: 40px; }
        
        .clause { font-size: 0.75rem; line-height: 1.8; margin-bottom: 20px; color: #666; }
        
        .warn { color: var(--r); font-weight: bold; animation: glitch 0.2s infinite; }

        @keyframes glitch {
            0% { transform: translateX(0); }
            50% { transform: translateX(-2px); text-shadow: 2px 0 blue; }
            100% { transform: translateX(2px); text-shadow: -2px 0 var(--r); }
        }

        .btns { display: flex; flex-direction: column; gap: 20px; margin-top: 40px; }
        
        button { 
            background: none; border: 1px solid #222; color: #444; 
            padding: 15px; letter-spacing: 5px; font-size: 0.7rem;
        }

        /* EFECTO DE RETORCIMIENTO TRAUMÁTICO */
        .trauma { animation: flash 0.04s infinite !important; }
        @keyframes flash {
            0% { background: #fff; filter: invert(1); }
            50% { background: #000; filter: invert(0); transform: scale(1.5); }
            100% { background: #500; }
        }
    </style>
</head>
<body onmousemove="track(event)" ontouchmove="track(event)">

<div id="demon"></div>
<div id="ui">
    <h1>CONTRATO</h1>
    <div class="clause">El <b>Demonio del Secreto</b> ha tomado tu ubicación. Tus secretos ahora le pertenecen.</div>
    <div class="clause warn">QUIEN LOS ESCUCHE MORIRÁ.</div>
    <div class="clause" style="font-size:0.6rem">No cierres los ojos. El silencio es el hambre del demonio.</div>
    
    <div class="btns">
        <button onclick="pact()">SÍ, ACEPTO EL VÍNCULO</button>
        <button id="no" onmouseover="run()">NO</button>
    </div>
</div>

<script>
    // Generar puntos de mirada
    for(let i=0; i<30; i++) {
        let e = document.createElement('div');
        e.className = 'watcher';
        e.style.left = Math.random()*100+'%';
        e.style.top = Math.random()*100+'%';
        document.body.appendChild(e);
    }

    function track(e) {
        let x = e.clientX || e.touches[0].clientX;
        let y = e.clientY || e.touches[0].clientY;
        document.querySelectorAll('.watcher').forEach(w => {
            w.style.opacity = Math.random() > 0.98 ? "1" : "0";
            w.style.transform = `translate(${(x/50)}px, ${(y/50)}px)`;
        });
    }

    function run() {
        let btn = document.getElementById('no');
        btn.style.position = 'fixed';
        btn.style.left = Math.random()*80+'%';
        btn.style.top = Math.random()*80+'%';
        btn.innerHTML = "EL MIEDO ES REAL";
    }

    function pact() {
        document.body.classList.add('trauma');
        if(navigator.vibrate) navigator.vibrate([50, 50, 50, 50, 1000]);

        setTimeout(() => {
            document.body.classList.remove('trauma');
            document.body.style.background = "#000";
            document.getElementById('ui').innerHTML = `
                <h1 style="color:red">CONTRATO SELLADO</h1>
                <p style="color:white; font-size:0.9rem">AHORA ERES PROPIEDAD DEL SECRETO.</p>
                <div style="border:1px solid red; padding:20px; color:red; background:#100; font-size:0.7rem">
                    PAGO: DEBERÁS MANDAR TU PRÓXIMA ACTUALIZACIÓN DE CORREO.<br><br>
                    ÉL TE OBSERVARÁ MIENTRAS LO HACES.
                </div>
                <p style="color:#333; font-size:0.5rem; margin-top:30px">
                    Sugerencia: No mires debajo de tu cama al irte a dormir.<br>
                    Tu sombra parece pesar más ahora, ¿verdad?
                </p>
            `;
            
            // Sonido de sistema falso (Inseguridad psicológica)
            console.warn("Vínculo establecido. Monitorización de retina activa.");
            
            // Programar un susto visual para después (Efecto residual)
            setInterval(() => {
                document.body.style.filter = "invert(1)";
                setTimeout(() => document.body.style.filter = "none", 30);
            }, 10000);
        }, 600);
    }
</script>
</body>
</html>
